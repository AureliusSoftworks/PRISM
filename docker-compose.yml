services:
  # NOTE on exposure: by default every published port binds to 127.0.0.1, so a
  # fresh `docker compose up` is private to the host machine. To allow other
  # devices on your network to reach Prism, set these in .env and re-run
  # `docker compose up -d`:
  #   PRISM_BIND_HOST=0.0.0.0
  #   PRISM_LAN_ACCESS=true
  #   PRISM_WEB_LAN=1
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    # Qdrant is only used internally by the API over the Docker network, so its
    # debug port stays bound to loopback regardless of LAN access.
    ports:
      - "127.0.0.1:6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    # Loads optional provider credentials, including BRAVE_SEARCH_API_KEY.
    env_file: .env
    environment:
      - API_PORT=18787
      # Inside the container the API must listen on all interfaces for Docker's
      # port mapping to reach it; host-level exposure is controlled by the
      # PRISM_BIND_HOST prefix on the published port below.
      - API_HOST=0.0.0.0
      - PRISM_LAN_ACCESS=${PRISM_LAN_ACCESS:-false}
      - PRISM_WEB_PORT=${PRISM_WEB_PORT:-18788}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - api_data:/app/apps/api/data
    ports:
      - "${PRISM_BIND_HOST:-127.0.0.1}:18787:18787"
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    restart: unless-stopped
    environment:
      - PORT=18788
      - HOSTNAME=0.0.0.0
      - LOCALAI_API_ORIGIN=http://api:18787
      - PRISM_WEB_LAN=${PRISM_WEB_LAN:-0}
    ports:
      - "${PRISM_BIND_HOST:-127.0.0.1}:18788:18788"
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PRISM_BIND_HOST:-127.0.0.1}:80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

volumes:
  qdrant_data:
  api_data:
