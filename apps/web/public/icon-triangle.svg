<?xml version="1.0" encoding="UTF-8"?>
<!-- Light-theme brand icon: a single closed stroked path so all three
     vertices are real mitered corners, not three independent line caps.

     The mark uses the same tightened geometry as the hover-preview Prism
     triangle: top vertex locked at (28, 6), bottom corners lifted/narrowed
     to (48, 43) and (8, 43), 7px stroke, and miter joins. At 30px display
     size this keeps the mark compact while preserving enough stroke weight.

     Paired in page.module.css with a drop-shadow filter that traces the
     stroke's alpha, plus a continuous hue-rotate animation that spins
     the entire palette around the color wheel so light mode mirrors
     dark mode's chromatic motion language. -->
<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="prismTriangleStroke" gradientUnits="userSpaceOnUse" x1="8" y1="43" x2="48" y2="6">
      <stop offset="0" stop-color="#e11d48"/>
      <stop offset="0.18" stop-color="#d97706"/>
      <stop offset="0.36" stop-color="#0d9488"/>
      <stop offset="0.54" stop-color="#0284c7"/>
      <stop offset="0.72" stop-color="#7c3aed"/>
      <stop offset="0.9" stop-color="#db2777"/>
      <stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
  </defs>
  <path
    d="M28 6L48 43H8L28 6Z"
    stroke="#111827"
    stroke-opacity="0.2"
    stroke-width="8.5"
    stroke-linecap="butt"
    stroke-linejoin="miter"
    stroke-miterlimit="10"
  />
  <path
    d="M28 6L48 43H8L28 6Z"
    stroke="url(#prismTriangleStroke)"
    stroke-width="7"
    stroke-linecap="butt"
    stroke-linejoin="miter"
    stroke-miterlimit="10"
  />
</svg>
