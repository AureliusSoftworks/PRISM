<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="wikiwiki-light-brand-filter" color-interpolation-filters="sRGB">
      <feComponentTransfer>
        <feFuncR type="table" tableValues="1 0"/>
        <feFuncG type="table" tableValues="1 0"/>
        <feFuncB type="table" tableValues="1 0"/>
      </feComponentTransfer>
      <feColorMatrix type="hueRotate" values="180"/>
      <feColorMatrix type="saturate" values="1.14"/>
    </filter>
  </defs>
  <image href="data:image/svg+xml;base64," width="512" height="512" preserveAspectRatio="xMidYMid meet" filter="url(#wikiwiki-light-brand-filter)"/>
</svg>
