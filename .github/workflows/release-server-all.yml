name: Release Prism Server (all platforms)

# Runs release-main-style draft creation, then Mac DMG + Windows installer (+ portable ZIP)
# + Linux tarball in parallel. Optional Mac client CI (artifact only).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Shared release version without leading v (example: 0.2.0)"
        required: true
        type: string
      client_testflight_build:
        description: "Required App Store Connect/TestFlight build reference"
        required: true
        type: string
      build_mac_client:
        description: "After server uploads, run Mac client CI (Actions artifact only)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-server-all-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate release gate
    runs-on: ubuntu-latest
    steps:
      - name: Enforce main-only releases
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Release workflow is allowed only from main."
            exit 1
          fi

      - name: Validate release inputs
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          CLIENT_TESTFLIGHT_BUILD: ${{ inputs.client_testflight_build }}
        run: |
          set -euo pipefail
          if ! [[ "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must follow SemVer core format (example: 0.2.0)."
            exit 1
          fi
          if [ -z "$(printf '%s' "${CLIENT_TESTFLIGHT_BUILD}" | tr -d '[:space:]')" ]; then
            echo "client_testflight_build is required for private-lane traceability."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck workspace
        run: npm run typecheck

      - name: Lint workspace
        run: npm run lint

      - name: Ensure changelog contains target version section
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          escaped_version="${RELEASE_VERSION//./\\.}"
          if ! grep -Eq "^## \\[${escaped_version}\\]( - .+)?$" CHANGELOG.md; then
            echo "CHANGELOG.md must include a ## [${RELEASE_VERSION}] section before release."
            exit 1
          fi

  create-releases:
    name: Create draft release lanes
    runs-on: ubuntu-latest
    needs: preflight
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_VERSION: ${{ inputs.version }}
      CLIENT_TESTFLIGHT_BUILD: ${{ inputs.client_testflight_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build server artifact bundle
        run: |
          mkdir -p release-artifacts/server
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=release-artifacts \
            --exclude=apps/web/.next \
            --exclude=apps/api/data \
            -czf "release-artifacts/server/prism-server-v${RELEASE_VERSION}-bundle.tar.gz" \
            .

      - name: Build private client lane manifest
        run: |
          mkdir -p release-artifacts/client
          cat <<EOF > "release-artifacts/client/prism-client-v${RELEASE_VERSION}-private-lane.txt"
          Prism Client private distribution lane
          =====================================
          Version: v${RELEASE_VERSION}
          Channel: Private TestFlight (invite-only)
          Discoverability: Not publicly listed
          Build reference: ${CLIENT_TESTFLIGHT_BUILD:-not-provided}

          Note:
          - This repository publishes server release artifacts.
          - Native iOS/macOS binaries are distributed through private TestFlight.
          EOF

      - name: Create or update draft releases
        run: |
          set -euo pipefail

          server_tag="server/v${RELEASE_VERSION}"
          client_tag="client/v${RELEASE_VERSION}"

          ensure_release() {
            local tag="$1"
            local title="$2"
            local notes_file="$3"
            if gh release view "$tag" >/dev/null 2>&1; then
              gh release edit "$tag" \
                --draft=true \
                --title "$title" \
                --notes-file "$notes_file" \
                --target "${GITHUB_SHA}"
            else
              gh release create "$tag" \
                --draft \
                --target "${GITHUB_SHA}" \
                --title "$title" \
                --notes-file "$notes_file"
            fi
          }

          cat <<EOF > /tmp/server-notes.md
          ## Prism Server Draft Release

          - Branch source: \`main\`
          - Shared version: \`v${RELEASE_VERSION}\`

          ### Public server downloads (end users)
          - **macOS:** \`Prism-Server-v${RELEASE_VERSION}.dmg\` — run \`release-server-mac.yml\` or this orchestrator.
          - **Windows:** \`Prism-Server-Setup-v${RELEASE_VERSION}-win-x64.exe\` — main installer.
          - **Windows (portable):** \`Prism-Server-v${RELEASE_VERSION}-win-x64-portable.zip\` — extracted folder run (no installer).
          - **Linux x86_64:** \`Prism-Server-v${RELEASE_VERSION}-linux-x64.tar.gz\` — vendored Node + Qdrant + \`start.sh\`.

          ### Developer / audit bundle
          - **Source tree export:** \`prism-server-v${RELEASE_VERSION}-bundle.tar.gz\` — not a turnkey runtime; for inspection, custom builds, or advanced Linux from source.

          ### Next steps
          - Upload any missing assets via platform workflows or re-run \`release-server-all.yml\`.
          - Publish manually after deployment gate is confirmed.
          EOF

          cat <<EOF > /tmp/client-notes.md
          ## Prism Client Private Lane

          - Branch source: \`main\`
          - Shared version: \`v${RELEASE_VERSION}\`
          - Distribution: Private TestFlight lane (not public App Store listing)
          - Build reference: \`${CLIENT_TESTFLIGHT_BUILD:-not-provided}\`
          EOF

          ensure_release "$server_tag" "Prism Server v${RELEASE_VERSION}" /tmp/server-notes.md
          ensure_release "$client_tag" "Prism Client v${RELEASE_VERSION} (Private Lane)" /tmp/client-notes.md

      - name: Upload release assets
        run: |
          set -euo pipefail
          gh release upload "server/v${RELEASE_VERSION}" \
            "release-artifacts/server/prism-server-v${RELEASE_VERSION}-bundle.tar.gz" \
            --clobber
          gh release upload "client/v${RELEASE_VERSION}" \
            "release-artifacts/client/prism-client-v${RELEASE_VERSION}-private-lane.txt" \
            --clobber

  mac-server:
    name: macOS DMG
    needs: create-releases
    uses: ./.github/workflows/release-server-mac.yml
    with:
      version: ${{ inputs.version }}
    secrets: inherit

  win-server:
    name: Windows installer
    needs: create-releases
    uses: ./.github/workflows/release-server-windows.yml
    with:
      version: ${{ inputs.version }}
    secrets: inherit

  linux-server:
    name: Linux tarball
    needs: create-releases
    uses: ./.github/workflows/release-server-linux.yml
    with:
      version: ${{ inputs.version }}
    secrets: inherit

  client-mac:
    name: Mac client (artifact)
    needs: [mac-server, win-server, linux-server]
    if: ${{ inputs.build_mac_client }}
    uses: ./.github/workflows/build-client-mac.yml
    with:
      version: ${{ inputs.version }}
    secrets: inherit
