name: Test Desktop Build (pre-release check)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to stamp (example: 0.3.0)"
        required: true
        type: string
      platforms:
        description: "Platforms to build (comma-separated: macos, linux, windows, or all)"
        required: false
        type: string
        default: "all"

permissions:
  contents: read

concurrency:
  group: test-desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if ! [[ "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must follow SemVer core format (example: 0.3.0)."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck workspace
        run: npm run typecheck

      - name: Lint workspace
        run: npm run lint

  build-macos:
    name: Build macOS desktop
    runs-on: macos-latest
    needs: preflight
    if: contains(inputs.platforms, 'macos') || inputs.platforms == 'all'
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Stamp version
        run: node scripts/set-version.mjs --version "${RELEASE_VERSION}"

      - name: Vendor Qdrant binary
        run: |
          chmod +x apps/server-mac/scripts/vendor-qdrant.sh
          apps/server-mac/scripts/vendor-qdrant.sh "apps/server-mac/Resources/qdrant"

      - name: Build and package macOS artifact
        run: |
          chmod +x scripts/package-desktop-macos.sh
          scripts/package-desktop-macos.sh "${RELEASE_VERSION}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Prism-Desktop-v${{ inputs.version }}-macos
          path: dist-desktop/Prism-Desktop-v${{ inputs.version }}.dmg
          if-no-files-found: error
          retention-days: 7

  build-linux:
    name: Build Linux desktop
    runs-on: ubuntu-latest
    needs: preflight
    if: contains(inputs.platforms, 'linux') || inputs.platforms == 'all'
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2
          sudo apt-get install -y desktop-file-utils squashfs-tools file zsync

      - name: Install dependencies
        run: npm ci

      - name: Stamp version
        run: node scripts/set-version.mjs --version "${RELEASE_VERSION}"

      - name: Vendor Qdrant binary
        run: |
          set -euo pipefail
          mkdir -p apps/server-mac/Resources /tmp/prism-qdrant-linux
          curl --fail --location --show-error \
            "https://github.com/qdrant/qdrant/releases/download/v1.17.1/qdrant-x86_64-unknown-linux-gnu.tar.gz" \
            --output /tmp/prism-qdrant-linux/qdrant.tar.gz
          tar -xzf /tmp/prism-qdrant-linux/qdrant.tar.gz -C /tmp/prism-qdrant-linux
          qdrant_bin="$(find /tmp/prism-qdrant-linux -type f -name qdrant | head -n 1)"
          if [ -z "${qdrant_bin}" ]; then
            echo "Failed to locate extracted qdrant binary."
            exit 1
          fi
          install -m 0755 "${qdrant_bin}" "apps/server-mac/Resources/qdrant"

      - name: Build and package Linux artifact
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
          ARCH: "x86_64"
          RUST_BACKTRACE: "1"
        run: |
          chmod +x scripts/package-desktop-linux.sh
          scripts/package-desktop-linux.sh "${RELEASE_VERSION}"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Prism-Desktop-v${{ inputs.version }}-linux
          path: dist-desktop/Prism-Desktop-v${{ inputs.version }}-linux-x64.AppImage
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Build Windows desktop
    runs-on: windows-latest
    needs: preflight
    if: contains(inputs.platforms, 'windows') || inputs.platforms == 'all'
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Stamp version
        run: node scripts/set-version.mjs --version $env:RELEASE_VERSION

      - name: Vendor Qdrant binary
        shell: pwsh
        run: |
          pwsh apps/server-windows/scripts/vendor-qdrant.ps1 -OutputDir "apps/server-windows/src/Resources/qdrant"

      - name: Build and package Windows artifact
        shell: pwsh
        run: |
          pwsh scripts/package-desktop-windows.ps1 -Version $env:RELEASE_VERSION

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Prism-Desktop-v${{ inputs.version }}-windows
          path: |
            dist-desktop/Prism-Desktop-Setup-v${{ inputs.version }}-win-x64.exe
            dist-desktop/Prism-Desktop-Setup-v${{ inputs.version }}-win-x64.msi
          if-no-files-found: warn
          retention-days: 7
