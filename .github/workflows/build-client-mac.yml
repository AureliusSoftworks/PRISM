name: Build Prism Client macOS (artifact only)

# Produces a Release build for QA; does not upload to GitHub Releases.
# Retail distribution is via the App Store / TestFlight.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version label for the artifact name (example: 0.1.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: build-client-mac-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Xcode Release build (unsigned ok)
    runs-on: macos-latest
    steps:
      - name: Enforce main-only client build lane
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Client mac CI build is allowed only from main."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build PrismClient (Release, no code signing)
        run: |
          DERIVED="build/PrismClient-Derived"
          xcodebuild \
            -project "apps/client-mac/PrismClient.xcodeproj" \
            -scheme PrismClient \
            -configuration Release \
            -derivedDataPath "${DERIVED}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Upload Prism.app artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrismClient-macOS-v${{ inputs.version }}
          path: build/PrismClient-Derived/Build/Products/Release/Prism.app
          retention-days: 60
