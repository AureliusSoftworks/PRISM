name: Release Pipeline (dev -> main)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Shared release version without leading v (example: 0.2.0)"
        required: true
        type: string
      desktop_release_channel:
        description: "Optional desktop release channel note (example: github, steam-beta)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate release gate
    runs-on: ubuntu-latest
    steps:
      - name: Enforce main-only releases
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Release workflow is allowed only from main."
            exit 1
          fi

      - name: Validate release inputs
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          DESKTOP_RELEASE_CHANNEL: ${{ inputs.desktop_release_channel }}
        run: |
          set -euo pipefail
          if ! [[ "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must follow SemVer core format (example: 0.2.0)."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck workspace
        run: npm run typecheck

      - name: Lint workspace
        run: npm run lint

      - name: Ensure changelog contains target version section
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          escaped_version="${RELEASE_VERSION//./\\.}"
          if ! grep -Eq "^## \\[${escaped_version}\\]( - .+)?$" CHANGELOG.md; then
            echo "CHANGELOG.md must include a ## [${RELEASE_VERSION}] section before release."
            exit 1
          fi

  create-releases:
    name: Create draft release lanes
    runs-on: ubuntu-latest
    needs: preflight
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_VERSION: ${{ inputs.version }}
      DESKTOP_RELEASE_CHANNEL: ${{ inputs.desktop_release_channel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build server artifact bundle
        run: |
          mkdir -p release-artifacts/server
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=release-artifacts \
            --exclude=apps/web/.next \
            --exclude=apps/api/data \
            -czf "release-artifacts/server/prism-server-v${RELEASE_VERSION}-bundle.tar.gz" \
            .

      - name: Build desktop lane manifest
        run: |
          mkdir -p release-artifacts/client
          cat <<EOF > "release-artifacts/client/prism-desktop-v${RELEASE_VERSION}-lane.txt"
          Prism Desktop release lane
          ==========================
          Version: v${RELEASE_VERSION}
          Channel: ${DESKTOP_RELEASE_CHANNEL:-github}

          Note:
          - Transitional workflow that still creates split server/client tags.
          - Customer-facing positioning should use Prism Desktop naming.
          EOF

      - name: Create or update draft releases
        run: |
          set -euo pipefail

          server_tag="server/v${RELEASE_VERSION}"
          client_tag="client/v${RELEASE_VERSION}"

          ensure_release() {
            local tag="$1"
            local title="$2"
            local notes_file="$3"
            if gh release view "$tag" >/dev/null 2>&1; then
              gh release edit "$tag" \
                --draft=true \
                --title "$title" \
                --notes-file "$notes_file" \
                --target "${GITHUB_SHA}"
            else
              gh release create "$tag" \
                --draft \
                --target "${GITHUB_SHA}" \
                --title "$title" \
                --notes-file "$notes_file"
            fi
          }

          cat <<EOF > /tmp/server-notes.md
          ## Prism Server Draft Release

          - Branch source: \`main\`
          - Shared version: \`v${RELEASE_VERSION}\`

          ### Public server downloads (end users)
          - **macOS:** \`Prism-Server-v${RELEASE_VERSION}.dmg\` — upload via \`.github/workflows/release-server-mac.yml\` (or run \`release-server-all.yml\`).
          - **Windows:** \`Prism-Server-Setup-v${RELEASE_VERSION}-win-x64.exe\` — Inno installer.
          - **Windows (portable):** \`Prism-Server-v${RELEASE_VERSION}-win-x64-portable.zip\` — folder run, no installer.
          - **Linux x86_64:** \`Prism-Server-v${RELEASE_VERSION}-linux-x64.tar.gz\` — vendored Node + Qdrant + \`start.sh\`.

          ### Developer / audit bundle
          - **Source tree export:** \`prism-server-v${RELEASE_VERSION}-bundle.tar.gz\` — attached by this workflow; for inspection, custom builds, or advanced Linux from source (not the turnkey Linux download).

          ### Next steps
          - Run platform workflows (or \`release-server-all.yml\`) until the assets above are present, then publish manually after the deployment gate is confirmed.
          EOF

          cat <<EOF > /tmp/client-notes.md
          ## Prism Client Draft Release (Transitional)

          - Branch source: \`main\`
          - Shared version: \`v${RELEASE_VERSION}\`
          - Desktop release channel note: \`${DESKTOP_RELEASE_CHANNEL:-github}\`
          - This split client tag is transitional while Prism Desktop lanes are being unified.
          EOF

          ensure_release "$server_tag" "Prism Server v${RELEASE_VERSION}" /tmp/server-notes.md
          ensure_release "$client_tag" "Prism Client v${RELEASE_VERSION} (Transitional)" /tmp/client-notes.md

      - name: Upload release assets
        run: |
          set -euo pipefail
          gh release upload "server/v${RELEASE_VERSION}" \
            "release-artifacts/server/prism-server-v${RELEASE_VERSION}-bundle.tar.gz" \
            --clobber
          gh release upload "client/v${RELEASE_VERSION}" \
            "release-artifacts/client/prism-desktop-v${RELEASE_VERSION}-lane.txt" \
            --clobber
