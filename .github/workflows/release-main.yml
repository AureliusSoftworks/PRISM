name: Release Pipeline (desktop-only)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Desktop release version without leading v (example: 0.2.0)"
        required: true
        type: string
      desktop_release_channel:
        description: "Optional desktop release channel note (example: github, steam-beta)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-desktop:
    name: Release Prism Desktop (all platforms)
    uses: ./.github/workflows/release-desktop-all.yml
    with:
      version: ${{ inputs.version }}
      release_channel: ${{ inputs.desktop_release_channel }}
    secrets: inherit
