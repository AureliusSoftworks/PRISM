name: Release Prism Server Linux bundle

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Shared release version without leading v (example: 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-server-linux-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bundle-linux:
    name: Build Linux x64 runtime tarball
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - name: Enforce main-only server releases
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Prism Server Linux release workflow is allowed only from main."
            exit 1
          fi

      - name: Validate release version
        run: |
          if ! echo "${RELEASE_VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "version must follow SemVer core format (example: 0.1.0)."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Package Linux server tarball
        run: |
          chmod +x scripts/package-linux-server-release.sh
          scripts/package-linux-server-release.sh "${RELEASE_VERSION}" dist-linux

      - name: Ensure server release exists
        run: gh release view "server/v${RELEASE_VERSION}"

      - name: Upload Linux tarball
        run: |
          gh release upload "server/v${RELEASE_VERSION}" \
            "dist-linux/Prism-Server-v${RELEASE_VERSION}-linux-x64.tar.gz" \
            --clobber
